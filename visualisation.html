<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEF IRVE – Bornes de recharge électrique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
     <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar__brand">
      <div class="navbar__logo">
        <img src="img/logo.png" alt="Logo LEF IRVE" class="navbar__logo-img" />
      </div>
      <span class="navbar__name">LEF IRVE</span>
    </div>
    <nav class="navbar__links">
      <a href="accueil.html" class="navbar__link">Accueil</a>
      <a href="visualisation.html" class="navbar__link navbar__link--active">Visualisation</a>
     <a href="statistique.html" class="navbar__link">Statistique</a>
    </nav>
  </header>
  <main class="main">
  <section class="points-charge">
    <h2>Points de charge</h2>
    
    <div class="filter-bar">
      <div class="filter-group">
        <label>Département</label>
        <input type="text" placeholder="Rechercher un département...">
      </div>
      
      <div class="filter-group-checkbox">
        <label>Type de prise</label>
        <div class="checkbox-list">
          <label><input type="checkbox"> Type 2</label>
          <label><input type="checkbox"> Combo CCS</label>
          <label><input type="checkbox"> E/F</label>
          <label><input type="checkbox"> ChaDeMo</label>
        </div>
      </div>
      
      <button class="btn-primary">Filtrer</button>
    </div>

    <div class="table-container">
       <p>Le tableau de données apparaîtra ici</p>
    </div>

    <div class="actions">
      <button class="btn-yellow" onclick="window.location.href='ajouter.html'">+ Ajouter</button>
      <button class="btn-yellow" onclick="window.location.href='predire_clusters.html'">Clusters</button>
      <button class="btn-yellow" onclick="window.location.href='predire_puissance_nominale.html'">Puissance</button>
      <button class="btn-yellow" onclick="window.location.href='predire_implantation.html'">Implantation</button>
    </div>
  </section>

  <section class="map-section">
    <h2>Carte des stations</h2>
    <div class="map-placeholder">
      <p>Intégration de la carte interactive (Leaflet/Mapbox)</p>
    </div>
  </section>
</main>
  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer__left">2026 ISEN – Projet Big Data / IA / Web</span>
    <span class="footer__right">Trinôme 2</span>
  </footer>

</body>
</html>
