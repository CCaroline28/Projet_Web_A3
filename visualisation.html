<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEF IRVE – Bornes de recharge électrique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
     <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar__brand">
      <div class="navbar__logo">
        <img src="img/logo.png" alt="Logo LEF IRVE" class="navbar__logo-img" />
      </div>
      <span class="navbar__name">LEF IRVE</span>
    </div>
    <nav class="navbar__links">
      <a href="accueil.html" class="navbar__link">Accueil</a>
      <a href="visualisation.html" class="navbar__link navbar__link--active">Visualisation</a>
     <a href="statistique.html" class="navbar__link">Statistique</a>
    </nav>
  </header>
  <main class="main">
  <section class="points-charge">
    <h2>Points de charge</h2>
    
    <div class="filters">
      <div class="filter-group">
        <b><label>Département: </label></b>
        <input type="text" placeholder="complétion automatique...">
      </div>
      <div class="filter-group">
        <center><b><label>Type de prise: </label></b><br></center>
        <input type="checkbox"> 2 <input type="checkbox"> combo CCS <input type="checkbox"> ef <input type="checkbox"> chademo <input type="checkbox"> autre 
      </div>
      <button class="btn-primary">Valider</button>
      </div>

    <div class="table-container">
      <p>Tableau + bouton action pour chaque ligne + pagination + suppression + modification</p>
    </div>

    <div class="actions">
      <button class="btn-yellow">Ajouter une prise</button>
      <button class="btn-yellow">Prédire les clusters</button>
      <button class="btn-yellow">Prédire la puissance nominale</button>
      <button class="btn-yellow">Prédire l'implantation</button>
    </div>
  </section>

  <section class="map-section">
    <h2>Carte des stations</h2>
    <div class="map-placeholder">
      <img src="map-icon.png" alt="Carte" width="100">
    </div>
    <button class="btn-yellow">Prédire les clusters</button>
  </section>
</main>
  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer__left">2026 ISEN – Projet Big Data / IA / Web</span>
    <span class="footer__right">Trinôme 2</span>
  </footer>

</body>
</html>
